apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: tienda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_DATABASE
              value: tienda
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

          volumeMounts:
          - name: init-script
            mountPath: /docker-entrypoint-initdb.d/init.sql
            subPath: init.sql

      volumes:
        - name: init-script
          configMap:
            name: mysql-init-script