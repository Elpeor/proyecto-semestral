apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ventas
  namespace: tienda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-ventas
  template:
    metadata:
      labels:
        app: backend-ventas
    spec:
      containers:
        - name: backend-ventas
          image: 022983448261.dkr.ecr.us-east-1.amazonaws.com/backend-ventas:latest
          ports:
            - containerPort: 3001
          env:
          - name: DB_URL
            value: jdbc:mysql://db:3306/tienda
          - name: DB_USER
            value: root
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: MYSQL_ROOT_PASSWORD

          # Se agrega Resource para que Metrics Server calcule el % de CPU y Memoria para escalar 
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # HEALTH CHECKS (PROBES)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 3001
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 3001
            initialDelaySeconds: 40
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 20