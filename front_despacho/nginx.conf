server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/ventas/ {
        proxy_pass http://10.0.0.158:3001/api/v1/ventas/;
    }

    location /api/v1/despachos/ {
        proxy_pass http://10.0.0.132:3002/api/v1/despachos/;
    }
}