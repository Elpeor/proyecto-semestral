name: CI/CD Tienda Perritos - Backend ventas

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  build-push-deploy-backend-ventas:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR (runner)
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Backend y push a ECR
      run: |
        cd backend
        docker build -t tienda-backend-ventas .
        docker tag tienda-backend-ventas:latest ${{ secrets.ECR_REPO_URL_BACKEND_TIENDAS }}:latest
        docker push ${{ secrets.ECR_REPO_URL_BACKEND_TIENDAS }}:latest

    - name: Desplegar Backend vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_TIENDAS_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar tienda-backend-ventas desde ECR" \
          --parameters '{"commands":[
            "set -e",
            "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REPO_URL_BACKEND_TIENDAS }}:latest",
            "docker stop tienda-backend-ventas || true",
            "docker rm tienda-backend-ventas || true",
            "docker run -d --name tienda-backend-ventas -p 3001:3001 ${{ secrets.ECR_REPO_URL_BACKEND_TIENDAS }}:latest"
          ]}' \
          --output text