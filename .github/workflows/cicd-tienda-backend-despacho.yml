name: CI/CD Tienda - Backend despacho

on:
  push:
    branches: [ "main" ]
    paths:
      - "back-Despacho_SpringBoot/**"

jobs:
  build-push-deploy-backend-despacho:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR (runner)
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Backend despacho y push a ECR
      run: |
        cd back-Despacho_Springboot
        cd Springboot-API-REST
        docker build -t tienda-backend-despacho .
        docker tag tienda-backend-despacho:latest ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHO }}:latest
        docker push ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHO }}:latest

    - name: Desplegar Backend despacho vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_DESPACHO_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar tienda-backend-despacho desde ECR" \
          --parameters '{"commands":[
            "set -e",
            "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHO }}:latest",
            "docker stop tienda-backend-despacho || true",
            "docker rm tienda-backend-despacho || true",
            "docker run -d --name tienda-backend-despacho -p 3002:3002 ${{ secrets.ECR_REPO_URL_BACKEND_DESPACHO }}:latest"
          ]}' \
          --output text
